name: SDD Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Self-validation (traceability)
        run: npm run check-coverage

      - name: DRY check
        run: npm run check:dry

      - name: Generate SDD report
        run: npm run report:sdd

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload SDD report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdd-report
          path: reports/sdd-report.md